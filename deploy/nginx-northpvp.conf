# /etc/nginx/sites-available/northpvp.net
#
# This box is BACKEND ONLY. Players load the game from GitHub Pages and the
# browser opens a WebSocket to wss://northpvp.net/ws.
#
# Routes:
#   /ws       -> Go server WebSocket (proxied with Upgrade headers)
#   /healthz  -> Go server health probe
#   anything else -> 404 (no public site here)
#
# Symlink to enable:
#   sudo ln -s /etc/nginx/sites-available/northpvp.net /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Assumes Let's Encrypt certs already exist (e.g. via `certbot --nginx -d northpvp.net`).

# --- redirect HTTP -> HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name northpvp.net www.northpvp.net;
    return 301 https://northpvp.net$request_uri;
}

# --- main HTTPS site ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name northpvp.net www.northpvp.net;

    ssl_certificate     /etc/letsencrypt/live/northpvp.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/northpvp.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    # Tighten a couple of common headers (relax if you embed elsewhere)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Larger buffers help WS handshake on big sessions
    client_max_body_size 4m;

    # ----- WebSocket endpoint -----
    location /ws {
        proxy_pass         http://127.0.0.1:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WS connections must not be timed-out aggressively
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }

    # ----- health probe (e.g. for uptime monitoring) -----
    location = /healthz {
        proxy_pass         http://127.0.0.1:8080/healthz;
    }

    # ----- everything else: not a public site -----
    location / {
        return 404 "northpvp.net is a backend. Play the game at the GitHub Pages URL.\n";
        default_type text/plain;
    }
}
